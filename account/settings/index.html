<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Settings | FIS Online</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👔</text></svg>">
  <script type="module" crossorigin src="/assets/js/main-DCoyOBB-.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/css/main-B_TToA_h.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header__top"><div class="container">FIS Online</div></div>
      <div class="header__main">
        <button class="menu-toggle" aria-label="Open menu"><span class="menu-toggle__line"></span><span class="menu-toggle__line"></span><span class="menu-toggle__line"></span></button>
        <a href="/" class="logo"><span class="logo__text">FIS</span></a>
        <div class="header__actions"><a href="/cart/" class="header__action">Cart</a></div>
      </div>
    </header>
    <nav class="mobile-nav" role="navigation"><div class="mobile-nav__header"><span class="logo__text">FIS</span><button class="mobile-nav__close" aria-label="Close">×</button></div><div class="mobile-nav__body"><a href="/account/dashboard/" class="mobile-nav__link">Dashboard</a><a href="/" class="mobile-nav__link">Home</a></div></nav>
    <div class="sidebar-overlay"></div>
    <main class="page__content">
      <section class="section">
        <div class="container">
          <nav class="breadcrumb"><a href="/" class="breadcrumb__link">Home</a> / <a href="/account/dashboard/" class="breadcrumb__link">Account</a> / <span class="breadcrumb__item--active">Settings</span></nav>
          <h1 class="category-hero__title">Account Settings</h1>
          <div class="card card--shadow p-6" style="max-width: 480px;">
            <form data-validate>
              <div class="form-group"><label class="form-label">Name</label><input type="text" class="form-input" value="Customer" name="name"></div>
              <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="your@email.com" name="email"></div>
              <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-input" placeholder="+91 98765 43210" name="phone"></div>
              <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-input" placeholder="Leave blank to keep current" name="password"></div>
              <button type="submit" class="btn btn--primary">Save Changes</button>
            </form>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer"><div class="footer__bottom"><div class="container"><p class="footer__copyright">&copy; 2026 FIS Online</p></div></div></footer>
  </div>
</body>
</html>
